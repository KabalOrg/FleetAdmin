{{ template "header.html" . }}
<div class="min-h-screen flex items-center justify-center bg-slate-900">
    <div class="max-w-md w-full space-y-8">
        <div class="glass p-8 rounded-3xl border border-slate-700/50 shadow-2xl">
            <div class="text-center">
                <div class="mx-auto h-16 w-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center">
                    <svg class="h-8 w-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="mt-6 text-3xl font-extrabold text-slate-100">Вхід до системи</h2>
                <p class="mt-2 text-sm text-slate-400">Введіть пароль адміністратора</p>
            </div>
            <form class="mt-8 space-y-6" action="/login" method="POST">
                <div>
                    <label for="password" class="sr-only">Пароль</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="appearance-none rounded-xl relative block w-full px-4 py-3 bg-slate-800/50 border border-slate-700 placeholder-slate-500 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Пароль">
                </div>
                {{ if .error }}
                <div class="text-red-400 text-sm text-center">
                    {{ .error }}
                </div>
                {{ end }}
                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                        Увійти
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{ template "footer.html" . }}</content>
