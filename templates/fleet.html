{{ template "header.html" . }}
<div class="mb-6 flex justify-between items-center flex-wrap gap-4">
    <a href="/fleet/add"
        class="px-5 py-2.5 rounded-2xl bg-indigo-600 text-white text-sm font-bold shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 transition-all hover:-translate-y-0.5 active:translate-y-0 whitespace-nowrap">
        + Додати Авто
    </a>
    <div class="relative w-full max-w-sm">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <input type="text" id="tableSearch" placeholder="Пошук по таблиці..."
            class="block w-full pl-9 pr-3 py-2 border border-slate-700 rounded-xl leading-5 bg-slate-800/80 text-sm text-slate-300 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors">
    </div>
</div>
<div class="glass rounded-2xl shadow-2xl overflow-x-auto card-shadow">
    <table class="w-full min-w-[700px] divide-y divide-slate-700 table-fixed sortable-table">
        <colgroup>
            <col class="w-[15%] min-w-[100px]">
            <col class="w-[20%] min-w-[150px]">
            <col class="w-[8%] min-w-[60px]">
            <col class="w-[30%] min-w-[200px]">
            <col class="w-[12%] min-w-[100px]">
        </colgroup>
        <thead class="bg-slate-800/50">
            <tr>
                <th
                    class="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:bg-slate-700/50 transition-colors group">
                    Номер <span class="text-slate-600 group-hover:text-slate-400 ml-1">↕</span></th>
                <th
                    class="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:bg-slate-700/50 transition-colors group">
                    Модель <span class="text-slate-600 group-hover:text-slate-400 ml-1">↕</span></th>
                <th
                    class="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:bg-slate-700/50 transition-colors group">
                    Рік <span class="text-slate-600 group-hover:text-slate-400 ml-1">↕</span></th>
                <th
                    class="px-3 py-3 text-left text-xs font-semibold text-slate-400 uppercase cursor-pointer hover:bg-slate-700/50 transition-colors group">
                    Власник <span class="text-slate-600 group-hover:text-slate-400 ml-1">↕</span></th>
                <th class="px-3 py-3 text-right text-xs font-semibold text-slate-400 uppercase">Дії</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-800" id="tableBody">
            {{ range .cars }}
            <tr class="hover:bg-slate-800/40 transition-colors">
                <td class="px-3 py-2 whitespace-nowrap text-xs font-bold text-indigo-400"><a href="/fleet/detail/{{ .ID }}" class="hover:text-indigo-300">{{ .Number }}</a></td>
                <td class="px-3 py-2 whitespace-nowrap text-xs text-slate-300">{{ .Model }}</td>
                <td class="px-3 py-2 whitespace-nowrap text-xs text-slate-400">{{ .Year }}</td>
                <td class="px-3 py-2 text-xs text-slate-300 truncate">{{ .Owner }}</td>
                <td class="px-3 py-2 whitespace-nowrap text-right">
                    <div class="flex items-center justify-end space-x-1">
                        <a href="/fleet/detail/{{ .ID }}" title="Переглянути історію"
                            class="p-1.5 rounded-lg text-slate-400 hover:text-emerald-400 hover:bg-slate-700/50 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </a>
                        <a href="/fleet/edit/{{ .ID }}" title="Редагувати"
                            class="p-1.5 rounded-lg text-slate-400 hover:text-indigo-400 hover:bg-slate-700/50 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                </path>
                            </svg>
                        </a>
                        <form action="/fleet/delete/{{ .ID }}" method="POST" onsubmit="return confirm('Видалити?')">
                            <button type="submit" title="Видалити"
                                class="p-1.5 rounded-lg text-slate-400 hover:text-red-400 hover:bg-slate-700/50 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                    </path>
                                </svg>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ template "footer.html" . }}
