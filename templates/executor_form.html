{{ template "header.html" . }}
<div class="max-w-xl mx-auto glass p-10 rounded-3xl shadow-2xl card-shadow">
    <form action="{{ if .executor }}/executors/edit/{{ .executor.ID }}{{ else }}/executors/add{{ end }}" method="POST"
        class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Назва / ПІБ</label>
            <input type="text" name="name" value="{{ if .executor }}{{ .executor.Name }}{{ end }}" required
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Телефон</label>
            <input type="text" name="phone" value="{{ if .executor }}{{ .executor.Phone }}{{ end }}"
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Примітки</label>
            <textarea name="notes" rows="3"
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">{{ if .executor }}{{ .executor.Notes }}{{ end }}</textarea>
        </div>
        <div class="flex justify-end space-x-4 pt-6">
            <a href="/executors"
                class="px-6 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-slate-100 transition-colors">Скасувати</a>
            <button type="submit"
                class="px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 transition-all">
                {{ if .executor }}Оновити{{ else }}Додати{{ end }}
            </button>
        </div>
    </form>
</div>
{{ template "footer.html" . }}
