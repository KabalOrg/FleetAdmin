<!DOCTYPE html>
<html lang="uk" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} - Fleet Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-shadow {
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen">
    <nav class="glass sticky top-0 z-50 border-b border-slate-700 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button type="button" onclick="toggleMobileMenu()"
                        class="p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

                <div class="flex items-center space-x-3 sm:space-x-8">
                    <div class="flex items-center space-x-2 cursor-pointer group" onclick="window.location.href='/'"
                        title="Перейти на головну сторінку">
                        <div
                            class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/50 group-hover:scale-110 transition-transform">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0">
                                </path>
                            </svg>
                        </div>
                        <span
                            class="text-lg sm:text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">FleetAdmin</span>
                    </div>

                    <div class="hidden md:flex items-center space-x-1">
                        <a href="/fleet"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Автопарк` }}bg-slate-800 text-indigo-400{{ end }}">Автопарк</a>
                        <a href="/documents"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Документи` }}bg-slate-800 text-indigo-400{{ end }}">Документи</a>
                        <a href="/repairs"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Ремонти` }}bg-slate-800 text-indigo-400{{ end }}">Ремонти</a>
                        <a href="/tires"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Заміна Резини` }}bg-slate-800 text-indigo-400{{ end }}">Резина</a>
                        <a href="/executors"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Виконавці` }}bg-slate-800 text-indigo-400{{ end }}">Виконавці</a>
                        <a href="/document-types"
                            class="px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Типи документів` }}bg-slate-800 text-indigo-400{{ end }}">Типи
                            док-тів</a>
                    </div>
                </div>

                <div class="flex items-center space-x-2 flex-1 md:flex-initial justify-end">
                    <div class="relative w-full max-w-[120px] sm:max-w-[288px]">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 sm:h-5 sm:w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="carSearchInput" placeholder="Авто..." autocomplete="off"
                            class="block w-full pl-8 sm:pl-10 pr-3 py-1.5 sm:py-2 border border-slate-700 rounded-xl leading-5 bg-slate-800/80 text-slate-300 placeholder-slate-500 focus:outline-none focus:bg-slate-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-xs sm:text-sm transition-colors backdrop-blur-sm">

                        <!-- Search Results Dropdown -->
                        <div id="searchResults"
                            class="hidden absolute right-0 z-50 mt-1 w-64 sm:w-full bg-slate-800 border border-slate-700 rounded-xl shadow-lg max-h-60 overflow-y-auto custom-scrollbar">
                            <!-- Results injected by JS -->
                        </div>
                    </div>

                    <a href="/settings"
                        class="p-2 rounded-xl text-slate-400 hover:text-indigo-400 hover:bg-slate-800 transition-all duration-200 {{ if eq .title `Налаштування` }}text-indigo-400 bg-slate-800{{ end }}"
                        title="Налаштування">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
                            </path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden glass border-t border-slate-700/50 py-2 px-4 space-y-1">
            <a href="/fleet"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Автопарк` }}text-indigo-400 bg-slate-800/50{{ end }}">Автопарк</a>
            <a href="/documents"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Документи` }}text-indigo-400 bg-slate-800/50{{ end }}">Документи</a>
            <a href="/repairs"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Ремонти` }}text-indigo-400 bg-slate-800/50{{ end }}">Ремонти</a>
            <a href="/tires"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Заміна Резини` }}text-indigo-400 bg-slate-800/50{{ end }}">Резина</a>
            <a href="/executors"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Виконавці` }}text-indigo-400 bg-slate-800/50{{ end }}">Виконавці</a>
            <a href="/document-types"
                class="block px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition-all {{ if eq .title `Типи документів` }}text-indigo-400 bg-slate-800/50{{ end }}">Типи
                док-тів</a>
        </div>
    </nav>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        // Car Search Functionality
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('carSearchInput');
            const resultsDiv = document.getElementById('searchResults');
            let debounceTimer;

            if (searchInput && resultsDiv) {
                searchInput.addEventListener('input', function() {
                    clearTimeout(debounceTimer);
                    const query = this.value.trim();

                    if (query.length < 2) {
                        resultsDiv.classList.add('hidden');
                        return;
                    }

                    debounceTimer = setTimeout(() => {
                        fetch(`/api/search?q=${encodeURIComponent(query)}`)
                            .then(response => response.json())
                            .then(cars => {
                                resultsDiv.innerHTML = '';

                                if (cars.length === 0) {
                                    resultsDiv.innerHTML = '<div class="px-4 py-2 text-slate-400 text-sm">Нічого не знайдено</div>';
                                } else {
                                    cars.forEach(car => {
                                        const item = document.createElement('a');
                                        item.href = `/fleet/detail/${car.id}`;
                                        item.className = 'block px-4 py-2 hover:bg-slate-700 transition-colors border-b border-slate-700/50 last:border-b-0';
                                        item.innerHTML = `
                                            <div class="text-indigo-400 font-semibold text-sm">${car.number}</div>
                                            <div class="text-slate-300 text-xs">${car.model}</div>
                                        `;
                                        resultsDiv.appendChild(item);
                                    });
                                }

                                resultsDiv.classList.remove('hidden');
                            })
                            .catch(error => {
                                console.error('Search error:', error);
                                resultsDiv.classList.add('hidden');
                            });
                    }, 300);
                });

                // Hide results when clicking outside
                document.addEventListener('click', function(e) {
                    if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                        resultsDiv.classList.add('hidden');
                    }
                });
            }
        });
    </script>
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-extrabold mb-8 tracking-tight">{{ .title }}</h1>
