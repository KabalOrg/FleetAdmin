{{ template "header.html" . }}
<div class="max-w-xl mx-auto glass p-10 rounded-3xl shadow-2xl card-shadow">
    <form action="{{ if .car }}/fleet/edit/{{ .car.ID }}{{ else }}/fleet/add{{ end }}" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Номер автомобіля</label>
            <input type="text" name="number" value="{{ if .car }}{{ .car.Number }}{{ end }}" required
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all uppercase">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Модель</label>
            <input type="text" name="model" value="{{ if .car }}{{ .car.Model }}{{ end }}" required
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Рік випуску</label>
            <input type="number" name="year" value="{{ if .car }}{{ .car.Year }}{{ end }}" required
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-400 mb-2">Власник</label>
            <input type="text" name="owner" value="{{ if .car }}{{ .car.Owner }}{{ end }}" required
                class="w-full bg-slate-800 border-slate-700 text-slate-100 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all">
        </div>
        <div class="flex justify-end space-x-4 pt-6">
            <a href="/fleet"
                class="px-6 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-slate-100 transition-colors">Скасувати</a>
            <button type="submit"
                class="px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 transition-all">
                {{ if .car }}Оновити{{ else }}Додати{{ end }}
            </button>
        </div>
    </form>
</div>
{{ template "footer.html" . }}
